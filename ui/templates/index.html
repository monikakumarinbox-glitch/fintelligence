<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintelligence — AI Workload Optimization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN SYSTEM ─── */
:root {
  --bg:        #0a0e1a;
  --surface:   #111827;
  --surface2:  #1a2235;
  --border:    #1e2d45;
  --accent:    #00d4aa;
  --accent2:   #0099ff;
  --warn:      #ff6b35;
  --success:   #00d4aa;
  --text:      #e8edf5;
  --muted:     #6b7fa3;
  --danger:    #ff4757;
  --gold:      #ffd700;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── BACKGROUND GRID ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,14,26,0.9);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.5px;
}

.logo-text span {
  color: var(--accent);
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 20px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: rgba(0,212,170,0.1);
  border: 1px solid rgba(0,212,170,0.2);
  padding: 4px 10px;
  border-radius: 20px;
}

.live-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.dynatrace-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ─── MAIN LAYOUT ─── */
main {
  position: relative;
  z-index: 1;
  max-width: 1300px;
  margin: 0 auto;
  padding: 40px;
}

/* ─── SUMMARY CARDS ─── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.summary-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

.summary-card:hover { border-color: rgba(0,212,170,0.3); }

.card-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.card-value {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 32px;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
}

.card-value.warn { color: var(--warn); }
.card-value.neutral { color: var(--text); }

.card-sub {
  font-size: 12px;
  color: var(--muted);
}

/* ─── SECTION HEADERS ─── */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
}

.section-badge {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
}

.badge-auto {
  background: rgba(0,212,170,0.1);
  color: var(--accent);
  border: 1px solid rgba(0,212,170,0.2);
}

.badge-approval {
  background: rgba(255,107,53,0.1);
  color: var(--warn);
  border: 1px solid rgba(255,107,53,0.2);
}

.badge-done {
  background: rgba(107,127,163,0.1);
  color: var(--muted);
  border: 1px solid rgba(107,127,163,0.2);
}

/* ─── RECOMMENDATION CARDS ─── */
.rec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 16px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.rec-card:hover { border-color: rgba(0,212,170,0.2); transform: translateY(-1px); }

.rec-card.approval-needed {
  border-left: 3px solid var(--warn);
}

.rec-card.auto-applied {
  border-left: 3px solid var(--accent);
  opacity: 0.8;
}

.rec-card.approved {
  border-left: 3px solid var(--accent);
}

.rec-card.rejected {
  border-left: 3px solid var(--danger);
  opacity: 0.5;
}

.rec-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 16px;
}

.rec-left { flex: 1; }

.rec-type-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  margin-bottom: 10px;
  display: inline-block;
}

.type-model { background: rgba(255,107,53,0.15); color: var(--warn); }
.type-cache { background: rgba(0,212,170,0.1); color: var(--accent); }
.type-token { background: rgba(0,153,255,0.1); color: var(--accent2); }

.rec-title {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 8px;
  line-height: 1.3;
}

.rec-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

.rec-saving {
  text-align: right;
  flex-shrink: 0;
}

.saving-amount {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: var(--accent);
  line-height: 1;
}

.saving-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.saving-annual {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* ─── REC METADATA ─── */
.rec-meta {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.meta-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.meta-value {
  font-size: 13px;
  font-weight: 500;
}

.risk-low { color: var(--accent); }
.risk-high { color: var(--warn); }
.risk-medium { color: var(--gold); }

/* ─── COMPLIANCE NOTE ─── */
.compliance-note {
  background: rgba(255,107,53,0.06);
  border: 1px solid rgba(255,107,53,0.15);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: #ffaa80;
  margin-bottom: 20px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

/* ─── ACTION BUTTONS ─── */
.action-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.5px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}

.btn-approve {
  background: var(--accent);
  color: #0a0e1a;
}
.btn-approve:hover { background: #00f5c4; transform: translateY(-1px); }

.btn-test {
  background: transparent;
  color: var(--accent);
  border: 1px solid rgba(0,212,170,0.4);
}
.btn-test:hover { background: rgba(0,212,170,0.08); }

.btn-reject {
  background: transparent;
  color: var(--danger);
  border: 1px solid rgba(255,71,87,0.3);
}
.btn-reject:hover { background: rgba(255,71,87,0.08); }

.status-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 6px 14px;
  border-radius: 6px;
}

.status-applied { background: rgba(0,212,170,0.1); color: var(--accent); }
.status-rejected { background: rgba(255,71,87,0.1); color: var(--danger); }
.status-pending { background: rgba(255,107,53,0.1); color: var(--warn); }

/* ─── CONFIDENCE BAR ─── */
.confidence-bar {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.conf-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  width: 80px;
  flex-shrink: 0;
}

.conf-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.conf-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width 1s ease;
}

.conf-pct {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  width: 35px;
  text-align: right;
}

/* ─── AUDIT TRAIL ─── */
.audit-section {
  margin-top: 40px;
}

.audit-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.audit-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.audit-dot.applied { background: var(--accent); }
.audit-dot.pending { background: var(--warn); }
.audit-dot.rejected { background: var(--danger); }

.audit-action { font-size: 13px; font-weight: 500; }
.audit-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ─── REPORT SUMMARY ─── */
.report-summary {
  background: linear-gradient(135deg, rgba(0,212,170,0.05), rgba(0,153,255,0.05));
  border: 1px solid rgba(0,212,170,0.15);
  border-radius: 14px;
  padding: 28px;
  margin-top: 40px;
}

.report-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.report-text {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
}

/* ─── LOADING STATE ─── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px;
  flex-direction: column;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── TOAST NOTIFICATIONS ─── */
.toast-container {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 13px;
  min-width: 280px;
  animation: slideIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.success { border-left: 3px solid var(--accent); }
.toast.error { border-left: 3px solid var(--danger); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  main { padding: 20px; }
  header { padding: 16px 20px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Fintel<span>ligence</span></div>
  </div>
  <div class="header-meta">
    <div class="dynatrace-badge">Dynatrace MCP</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span style="color:var(--muted);font-size:13px">Loading optimization report...</span>
    </div>
  </div>
</main>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toasts"></div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let report = null;
let pendingApprovals = [];
let appliedActions = [];

// ─────────────────────────────────────────────
// FETCH DATA
// ─────────────────────────────────────────────
async function loadData() {
  try {
    const [reportRes, pendingRes, appliedRes] = await Promise.all([
      fetch('/api/report'),
      fetch('/api/pending'),
      fetch('/api/applied'),
    ]);

    report = await reportRes.json();
    pendingApprovals = await pendingRes.json();
    appliedActions = await appliedRes.json();

    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:80px;color:var(--muted)">
        <div style="font-size:32px;margin-bottom:16px">⚠️</div>
        <div>Could not connect to agent. Make sure app.py is running.</div>
      </div>`;
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  if (!report) return;
  const s = report.summary;

  document.getElementById('app').innerHTML = `

    <!-- SUMMARY CARDS -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="card-label">Total Waste Identified</div>
        <div class="card-value">$${s.total_waste_identified.toFixed(0)}</div>
        <div class="card-sub">per month · $${s.annual_savings_potential.toFixed(0)}/year</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Auto-Optimized</div>
        <div class="card-value">$${s.auto_optimized.toFixed(0)}</div>
        <div class="card-sub">applied with zero risk</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Awaiting Approval</div>
        <div class="card-value warn">$${s.awaiting_approval.toFixed(0)}</div>
        <div class="card-sub">compliance review required</div>
      </div>
      <div class="summary-card">
        <div class="card-label">Annual Savings Potential</div>
        <div class="card-value neutral">$${s.annual_savings_potential.toFixed(0)}</div>
        <div class="card-sub">if all approved</div>
      </div>
    </div>

    <!-- PENDING APPROVALS -->
    ${pendingApprovals.length > 0 ? `
    <div class="section-header">
      <div class="section-title">🔐 Compliance Approval Required</div>
      <div class="section-badge badge-approval">${pendingApprovals.length} pending</div>
    </div>
    ${pendingApprovals.map(rec => renderApprovalCard(rec)).join('')}
    ` : ''}

    <!-- AUTO APPLIED -->
    ${appliedActions.length > 0 ? `
    <div class="section-header" style="margin-top:40px">
      <div class="section-title">✅ Auto-Applied Optimizations</div>
      <div class="section-badge badge-auto">${appliedActions.length} applied</div>
    </div>
    ${appliedActions.map(rec => renderAppliedCard(rec)).join('')}
    ` : ''}

    <!-- AUDIT TRAIL -->
    ${renderAuditTrail()}

    <!-- PLAIN ENGLISH REPORT -->
    <div class="report-summary">
      <div class="report-title">📋 Compliance Summary</div>
      <div class="report-text">${report.plain_english_summary}</div>
    </div>
  `;

  // Animate confidence bars
  setTimeout(() => {
    document.querySelectorAll('.conf-fill').forEach(el => {
      el.style.width = el.dataset.width;
    });
  }, 100);
}

// ─────────────────────────────────────────────
// CARD RENDERERS
// ─────────────────────────────────────────────
function getTypeClass(type) {
  if (type === 'model_routing') return 'type-model';
  if (type === 'prompt_caching') return 'type-cache';
  return 'type-token';
}

function getTypeLabel(type) {
  if (type === 'model_routing') return 'MODEL ROUTING';
  if (type === 'prompt_caching') return 'PROMPT CACHING';
  return 'TOKEN OPTIMIZATION';
}

function renderApprovalCard(rec) {
  const confPct = Math.round((rec.confidence || 0.8) * 100);
  return `
  <div class="rec-card approval-needed" id="card-${rec.id}">
    <div class="rec-top">
      <div class="rec-left">
        <div class="rec-type-badge ${getTypeClass(rec.type)}">${getTypeLabel(rec.type)}</div>
        <div class="rec-title">${rec.title}</div>
        <div class="rec-desc">${rec.description}</div>
      </div>
      <div class="rec-saving">
        <div class="saving-amount">$${rec.saving_per_month.toFixed(0)}</div>
        <div class="saving-label">/month</div>
        <div class="saving-annual">$${rec.saving_per_year.toFixed(0)}/year</div>
      </div>
    </div>

    <div class="rec-meta">
      <div class="meta-item">
        <span class="meta-label">Risk Level</span>
        <span class="meta-value risk-${rec.risk}">${rec.risk.toUpperCase()}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Current Cost</span>
        <span class="meta-value">$${rec.current_cost}/mo</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Projected Cost</span>
        <span class="meta-value risk-low">$${rec.projected_cost.toFixed(2)}/mo</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Latency Impact</span>
        <span class="meta-value">${rec.latency_impact}</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Quality Risk</span>
        <span class="meta-value risk-low">${rec.quality_risk}</span>
      </div>
    </div>

    <div class="confidence-bar">
      <span class="conf-label">Confidence</span>
      <div class="conf-track">
        <div class="conf-fill" data-width="${confPct}%" style="width:0%"></div>
      </div>
      <span class="conf-pct">${confPct}%</span>
    </div>

    <div class="compliance-note" style="margin-top:16px">
      🔒 ${rec.compliance_note}
    </div>

    <div class="action-row">
      <button class="btn btn-approve" onclick="handleApprove('${rec.id}', 'full')">
        ✓ Approve
      </button>
      <button class="btn btn-test" onclick="handleApprove('${rec.id}', 'test')">
        ⟳ Test on 10% traffic
      </button>
      <button class="btn btn-reject" onclick="handleReject('${rec.id}')">
        ✕ Reject
      </button>
    </div>
  </div>`;
}

function renderAppliedCard(rec) {
  const isAutoApplied = !rec.approval_mode;
  return `
  <div class="rec-card auto-applied">
    <div class="rec-top">
      <div class="rec-left">
        <div class="rec-type-badge ${getTypeClass(rec.type)}">${getTypeLabel(rec.type)}</div>
        <div class="rec-title">${rec.title}</div>
        ${rec.result ? `<div class="rec-desc" style="margin-top:8px;color:var(--accent)">${rec.result}</div>` : ''}
      </div>
      <div class="rec-saving">
        <div class="saving-amount" style="font-size:22px">$${rec.saving_per_month.toFixed(0)}</div>
        <div class="saving-label">/month saved</div>
      </div>
    </div>
    <div class="action-row">
      <span class="status-tag status-applied">
        ${isAutoApplied ? '⚡ AUTO-APPLIED' : '✓ APPROVED & APPLIED'}
      </span>
      <span style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted)">
        ${new Date(rec.applied_at).toLocaleString()}
      </span>
    </div>
  </div>`;
}

function renderAuditTrail() {
  if (!report.audit_trail || !report.audit_trail.length) return '';
  return `
  <div class="audit-section">
    <div class="section-header">
      <div class="section-title">📋 Audit Trail</div>
      <div class="section-badge badge-done">${report.audit_trail.length} entries</div>
    </div>
    ${report.audit_trail.map(entry => `
    <div class="audit-item">
      <div class="audit-dot ${entry.status === 'AUTO-APPLIED' ? 'applied' : 'pending'}"></div>
      <div>
        <div class="audit-action">${entry.action}</div>
        <div class="audit-meta">
          ${entry.status} · ${entry.saving} · ${new Date(entry.timestamp).toLocaleString()}
        </div>
        <div class="audit-meta" style="color:#6b7fa3;margin-top:2px">${entry.compliance}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
async function handleApprove(id, mode) {
  const modeLabel = mode === 'test' ? '10% traffic test' : 'full rollout';
  try {
    const res = await fetch(`/api/approve/${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode })
    });
    const data = await res.json();

    if (data.status === 'approved') {
      showToast(`✅ Approved (${modeLabel}) — $${data.saving_locked_in.toFixed(0)}/month saved`, 'success');
      await loadData();
    }
  } catch (e) {
    showToast('❌ Error applying approval', 'error');
  }
}

async function handleReject(id) {
  try {
    const res = await fetch(`/api/reject/${id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason: 'Rejected by compliance officer' })
    });
    const data = await res.json();
    if (data.status === 'rejected') {
      showToast('Recommendation rejected and logged', 'success');
      await loadData();
    }
  } catch (e) {
    showToast('❌ Error rejecting', 'error');
  }
}

// ─────────────────────────────────────────────
// TOAST HELPER
// ─────────────────────────────────────────────
function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.getElementById('toasts').appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadData();
</script>
</body>
</html>
